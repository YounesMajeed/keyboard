<!DOCTYPE html>
<html lang="ur">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#064e3b">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>Shina Keyboard</title>
    
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;700&family=Cinzel:wght@700&family=Montserrat:wght@300;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app-wrapper">
    <header>
        <h1 class="logo">Shina Keyboard</h1>
        <p class="tagline">Echoes of the Dardic Voice</p>
    </header>

    <div class="top-section">
        <div class="controls">
            <button class="btn-copy" id="copy-btn">COPY TEXT</button>
        </div>
        <textarea id="display-area" inputmode="none" placeholder="ٹائپ کریں..." autofocus></textarea>
    </div>

    <div class="keyboard-container" id="kb-container">
        <div id="suggestion-bar" class="suggestion-bar"></div>
        <div id="keyboard-layout"></div>
    </div>
</div>

<div id="toast">TEXT COPIED</div>

<script src="app.js" defer></script>
</body>
</html>
